# yaml-language-server: $schema=../../../../Configuration/resources/configuration/configuration-schema-v1.json
features:
    - key: theme
      name: Theme
      description: Visual branding settings for Storefront, Back Office, and Merchant Portal
      enabled: true
      order: 10
      tabs:
          - key: backoffice
            name: Back Office
            icon: admin_panel_settings
            description: Back Office theme color
            order: 3
            enabled: true
            groups:
                # Each setting key is injected as a CSS custom property into :root via theme-styles.twig.
                # Underscores in the key are converted to hyphens: bo_main_color → --bo-main-color
                # CSS variables are consumed in: src/Spryker/Gui/assets/Zed/sass/_variables.scss
                # Injection template: src/Spryker/Gui/src/Spryker/Zed/Gui/Presentation/Partials/theme-styles.twig
                - key: colors
                  name: Back Office Colors
                  scopes:
                      - global
                      - store
                  enabled: true
                  settings:
                      - key: bo_main_color
                        name: Backoffice Theme Color
                        description: Primary theme color for the Back Office interface
                        type: color
                        default_value: '#1ebea0'
                        scopes:
                            - global
                            - store
                        enabled: true
                        secret: false
                        storefront: false
                        constraints:
                            - type: regex
                              message: 'Must be a valid hex color (e.g. #1ebea0)'
                              options:
                                  pattern: '^#[0-9A-Fa-f]{6}$'
                      - key: bo_sidenav_color
                        name: Backoffice Side Navigation Background
                        description: Side navigation and login background for the Back Office interface
                        type: color
                        default_value: '#23303c'
                        scopes:
                            - global
                            - store
                        enabled: true
                        secret: false
                        storefront: false
                        constraints:
                            - type: regex
                              message: 'Must be a valid hex color (e.g. #23303c)'
                              options:
                                  pattern: '^#[0-9A-Fa-f]{6}$'
                      - key: bo_sidenav_text_color
                        name: Backoffice Side Navigation Text Color
                        description: Side navigation text color for the Back Office interface
                        type: color
                        default_value: '#e4e4e4'
                        scopes:
                            - global
                            - store
                        enabled: true
                        secret: false
                        storefront: false
                        constraints:
                            - type: regex
                              message: 'Must be a valid hex color (e.g. #e4e4e4)'
                              options:
                                  pattern: '^#[0-9A-Fa-f]{6}$'

          - key: logos
            name: Logos
            icon: image
            description: Logo images for all application contexts
            order: 1
            enabled: true
            groups:
                - key: logos
                  name: Logos
                  scopes:
                      - global
                      - store
                  enabled: true
                  settings:
                      - key: backoffice_logo_url
                        name: Back Office Logo
                        description: Logo image displayed in the Back Office sidebar
                        type: file
                        file_upload:
                            storage_name: 'backoffice-media'
                            allowed_mime_types:
                                - 'image/png'
                                - 'image/jpeg'
                                - 'image/gif'
                                - 'image/webp'
                                - 'image/svg+xml'
                            allowed_extensions:
                                - '.png'
                                - '.jpg'
                                - '.jpeg'
                                - '.gif'
                                - '.webp'
                                - '.svg'
                            max_file_size: '10M'
                            recommended_width_px: 186
                            recommended_height_px: 50
                        default_value: ''
                        scopes:
                            - global
                            - store
                        enabled: true
                        secret: false
                        storefront: false
